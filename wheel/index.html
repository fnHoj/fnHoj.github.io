<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>内轮差</title>
    <style>
        :root {
            color-scheme: dark;
            background-color: #222;
        }
        body {
            margin: 0;
        }
        #canvas-container {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
    </style>
</head>
<body>
    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const W = 1920, H = 1080;

        const container = document.getElementById("canvas-container");
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        var mx = 0, my = 0;
        var hold = false;

        var l = 128;
        var ds = 8;
        var cx = W * 0.125, cy = H * 0.75;
        var dx = 0, dy = 0;
        var hx = 0, hy = 1;

        function clamp(x, l = 0, r = 1) {
            return x <= l ? l : x >= r ? r : x;
        }

        function draw() {
            ctx.fillStyle = "#00000002";
            ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(cx, cy, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.strokeWidth = 2;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + l * hx, cy + l * hy);
            ctx.stroke();
        }

        function hind_wheel(dx, dy) {
            let wx = dx * hx + dy * hy;
            let wy = dx * hy - dy * hx;
            let x1 = Math.tanh(Math.atanh(wx) - ds / l);
            let y1 = Math.sqrt(1 - x1 * x1);
            if (!isFinite(x1) || !isFinite(y1))
                return;
            if (wy >= 0) {
                hx = dx * x1 - dy * y1;
                hy = dx * y1 + dy * x1;
            }
            else {
                hx = dx * x1 + dy * y1;
                hy = dx * -y1 + dy * x1;
            }
            let hr = Math.hypot(hx, hy);
            hx /= hr;
            hy /= hr;
        }
        function update() {
            if (!hold)
                return;
            dx = mx - cx; dy = my - cy;
            let s = Math.hypot(dx, dy);
            if (s < ds)
                return;
            dx /= s; dy /= s;
            hind_wheel(dx, dy);
            cx = clamp(cx + ds * dx, 0, W);
            cy = clamp(cy + ds * dy, 0, H);
            draw();
        }
        function frame() {
            update();
            requestAnimationFrame(frame);
        }

        canvas.width = W;
        canvas.height = H;
        ctx.fillRect(0, 0, W, H);

        container.addEventListener("mousemove", (e)=>{
            mx = W * (e.clientX - canvas.offsetLeft) / canvas.clientWidth;
            my = H * (e.clientY - canvas.offsetTop) / canvas.clientHeight;
        });
        container.addEventListener("mousedown", (e)=>{
            hold = true;
            mx = W * (e.clientX - canvas.offsetLeft) / canvas.clientWidth;
            my = H * (e.clientY - canvas.offsetTop) / canvas.clientHeight;
        });
        container.addEventListener("mouseup", ()=>{hold = false;});

        draw();
        frame();
    </script>
</body>
</html>
